<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Nuevo interesado | EtaGebra</title>
    <link rel="icon" type="image/jpeg" href="assets/logo.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    >
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
      :root {
        --ink: #161827;
        --muted: #5c6070;
        --paper: #f7f5ee;
        --line: #ded8c8;
        --teal: #008c96;
        --coral: #b90726;
        --white: #ffffff;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        padding: 20px;
        font-family: "Inter", system-ui, sans-serif;
        background: var(--paper);
        color: var(--ink);
      }
      h1 {
        font-size: 1.3rem;
        margin: 0 0 4px;
      }
      p.hint {
        margin: 0 0 20px;
        color: var(--muted);
        font-size: 0.9rem;
      }
      label {
        display: block;
        font-weight: 600;
        margin: 16px 0 6px;
        font-size: 0.9rem;
      }
      input {
        width: 100%;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        font-size: 1rem;
        font-family: inherit;
        background: var(--white);
        color: var(--ink);
      }
      .cursos-list {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--white);
        overflow: hidden;
      }
      .curso-opcion {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 11px 12px;
        border-bottom: 1px solid var(--line);
        font-size: 0.95rem;
      }
      .curso-opcion:last-child { border-bottom: none; }
      .curso-opcion input { width: auto; }
      #error {
        color: var(--coral);
        font-size: 0.85rem;
        margin-top: 14px;
        display: none;
      }
    </style>
  </head>
  <body>
    <h1>Nuevo interesado</h1>
    <p class="hint">Registra los datos de quien preguntó por uno o varios cursos.</p>

    <form id="form">
      <label>Curso(s)</label>
      <div class="cursos-list" id="cursos_list">
        <label class="curso-opcion"><input type="checkbox" value="Aritmética y Fundamentos">Aritmética y Fundamentos</label>
        <label class="curso-opcion"><input type="checkbox" value="Álgebra I">Álgebra I</label>
        <label class="curso-opcion"><input type="checkbox" value="Álgebra II">Álgebra II</label>
        <label class="curso-opcion"><input type="checkbox" value="Cálculo Diferencial I">Cálculo Diferencial I</label>
        <label class="curso-opcion"><input type="checkbox" value="Cálculo Diferencial II">Cálculo Diferencial II</label>
        <label class="curso-opcion"><input type="checkbox" value="Cálculo Diferencial III">Cálculo Diferencial III</label>
        <label class="curso-opcion"><input type="checkbox" value="Cálculo Integral I">Cálculo Integral I</label>
        <label class="curso-opcion"><input type="checkbox" value="Cálculo Integral II">Cálculo Integral II</label>
        <label class="curso-opcion"><input type="checkbox" value="Cálculo Integral III">Cálculo Integral III</label>
        <label class="curso-opcion"><input type="checkbox" value="Inglés Básico I">Inglés Básico I</label>
        <label class="curso-opcion"><input type="checkbox" value="Inglés Básico II">Inglés Básico II</label>
      </div>

      <label for="curso_otro">Otro curso (opcional)</label>
      <input type="text" id="curso_otro" placeholder="Si no está en la lista">

      <label for="fecha">Fecha del curso</label>
      <input type="date" id="fecha" required>

      <label for="nombre">Nombre</label>
      <input type="text" id="nombre" placeholder="Nombre completo" required>

      <label for="celular">Celular</label>
      <input type="tel" id="celular" placeholder="10 dígitos" required>

      <p id="error"></p>
    </form>

    <script>
      const tg = window.Telegram && window.Telegram.WebApp;
      if (tg) {
        tg.expand();
        tg.MainButton.setText("Registrar interesado");
        tg.MainButton.show();
      }

      const form = document.getElementById("form");
      const cursosList = document.getElementById("cursos_list");
      const cursoOtro = document.getElementById("curso_otro");
      const errorEl = document.getElementById("error");

      function submit() {
        const cursos = Array.from(cursosList.querySelectorAll("input:checked")).map((el) => el.value);
        if (cursoOtro.value.trim()) {
          cursos.push(cursoOtro.value.trim());
        }
        const fecha = document.getElementById("fecha").value;
        const nombre = document.getElementById("nombre").value.trim();
        const celular = document.getElementById("celular").value.trim();

        if (!cursos.length || !fecha || !nombre || !celular) {
          errorEl.textContent = "Marca al menos un curso y llena los demás campos.";
          errorEl.style.display = "block";
          return;
        }
        errorEl.style.display = "none";

        const data = JSON.stringify({ cursos, fecha, nombre, celular });
        if (tg) {
          tg.sendData(data);
        } else {
          alert("Abre esto desde el botón del bot de Telegram.");
        }
      }

      if (tg) {
        tg.MainButton.onClick(submit);
      }
      form.addEventListener("submit", (e) => {
        e.preventDefault();
        submit();
      });
    </script>
  </body>
</html>
